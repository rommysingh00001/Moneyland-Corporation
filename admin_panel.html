<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DBBA ADMIN PANEL - Round Based</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{background:#050816;color:white;font-family:sans-serif;padding:20px;}
.glow{text-shadow:0 0 10px #f59e0b,0 0 20px #f59e0b,0 0 40px #f59e0b;}
.card{background:rgba(15,23,42,.8);padding:20px;border-radius:20px;margin-bottom:20px;}
.input-box{width:100%;padding:15px;font-size:24px;border-radius:15px;background:black;color:white;border:2px solid #f59e0b;outline:none;margin-bottom:15px;}
.btn{background:linear-gradient(90deg,#f59e0b,#fde047);color:black;font-weight:700;padding:16px;border-radius:15px;width:100%;cursor:pointer;border:none;font-size:18px;}
.btn:hover{box-shadow:0 0 20px #f59e0b;transform:scale(1.02);}
.history-card{background:#0f172a;padding:15px;border-radius:15px;margin-bottom:10px;}
</style>
</head>
<body>

<h1 class="text-4xl glow mb-5">🎰 DBBA ADMIN PANEL 🎰</h1>

<!-- ANNOUNCE RESULT -->
<div class="card">
<h2 class="text-2xl glow mb-3">Announce 10-digit Result</h2>
<input type="text" id="resultInput" class="input-box" maxlength="10" placeholder="e.g. 9475938492">
<button id="announceBtn" class="btn">🚀 Announce Result</button>
<div id="status" class="mt-3 glow"></div>
</div>

<!-- ROUND CONTROL -->
<div class="card">
<h2 class="text-2xl glow mb-3">Round Control</h2>
<button id="nextRoundBtn" class="btn">🔄 Start Next Round</button>
<div id="roundInfo" class="mt-3 glow">Current Round: 1</div>
</div>

<!-- RESULT HISTORY -->
<div class="card">
<h2 class="text-2xl glow mb-3">All Announced Results</h2>
<div id="historyDiv"></div>
</div>

<script>
// ==========================
// VARIABLES
// ==========================
let roundNumber = parseInt(localStorage.getItem("dbba_roundNumber") || "1");
let history = JSON.parse(localStorage.getItem("dbba_resultHistory") || "[]");

// Display past results
history.forEach(item => addHistory(item.result, item.round));

// ==========================
// ANNOUNCE RESULT
// ==========================
document.getElementById("announceBtn").onclick = ()=>{
    const value = document.getElementById("resultInput").value.trim();
    if(!/^\d{10}$/.test(value)){
        alert("Enter exactly 10 digits");
        return;
    }

    // Save result in localStorage for user panels
    localStorage.setItem("dbba_result", value);
    localStorage.setItem("dbba_result_time", Date.now());

    // Save history
    history.push({result:value, round:roundNumber});
    localStorage.setItem("dbba_resultHistory", JSON.stringify(history));

    addHistory(value, roundNumber);

    document.getElementById("status").innerText = `✅ Result Announced: ${value}`;
    alert("Result announced for Round "+roundNumber+"!");

    // Disable announce button to prevent duplicate result
    document.getElementById("announceBtn").disabled = true;
    document.getElementById("resultInput").disabled = true;
};

// ==========================
// START NEXT ROUND
// ==========================
document.getElementById("nextRoundBtn").onclick = ()=>{
    roundNumber++;
    localStorage.setItem("dbba_roundNumber", roundNumber);

    // Clear current result to allow new round
    localStorage.removeItem("dbba_result");

    // Enable announce input/button
    document.getElementById("announceBtn").disabled = false;
    document.getElementById("resultInput").disabled = false;
    document.getElementById("resultInput").value = "";

    document.getElementById("roundInfo").innerText = `Current Round: ${roundNumber}`;

    alert("✅ Round "+roundNumber+" is now open for betting!");
};

// ==========================
// ADD HISTORY
// ==========================
function addHistory(result, round){
    const div = document.createElement("div");
    div.className = "history-card";
    div.innerHTML = `<div><strong>Round ${round}:</strong> ${result}</div>`;
    document.getElementById("historyDiv").prepend(div);
}
</script>

</body>
</html>
