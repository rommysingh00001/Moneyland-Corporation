<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DBBA Live Betting</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background:#050816; color:white; font-family:'Segoe UI', sans-serif; }
  .card { background:#111; border-radius:8px; padding:15px; margin:10px 0; }
  .btn { background:#f59e0b; color:#111; padding:8px 16px; border:none; border-radius:5px; cursor:pointer; }
  .btn:hover { background:#d97706; }
</style>
</head>
<body class="p-6">

<h1 class="text-3xl font-bold mb-4 text-center">DBBA Live Betting</h1>

<!-- BETTING FORM -->
<div class="card">
  <h2 class="text-xl font-semibold mb-2">Place Your Bet</h2>
  <div class="flex flex-col md:flex-row gap-2">
    <input type="text" id="bet-number" placeholder="Enter 10-digit number" maxlength="10" class="p-2 rounded w-full md:w-1/2 text-black">
    <input type="number" id="bet-amount" placeholder="Amount" class="p-2 rounded w-full md:w-1/4 text-black">
    <button onclick="placeBet()" class="btn w-full md:w-1/4">Place Bet</button>
  </div>
</div>

<!-- LIVE RESULT -->
<div class="card mt-4">
  <h2 class="text-xl font-semibold mb-2">Live Result</h2>
  <div id="live-result" class="text-2xl font-mono">Waiting for first reveal...</div>
</div>

<!-- USER BET DASHBOARD -->
<div class="card mt-4">
  <h2 class="text-xl font-semibold mb-2">Your Bets & Multipliers</h2>
  <div id="user-bets" class="flex flex-col gap-2"></div>
</div>

<script>
/* ---------- SUPABASE CONFIG ---------- */
const SUPABASE_URL = "https://mqmcnbsgnaunqsiqbzxy.supabase.co";  // Replace
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xbWNuYnNnbmF1bnFzaXFienh5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MjYyNzIsImV4cCI6MjA5NDIwMjI3Mn0.Z_ZXi4q5NKGQw_6k0ICaz94ilnoky8jdYqhtTmKLAE4";      // Replace
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const USER_ID = "demo-user"; // replace with real auth later

/* ---------- PLACE BET ---------- */
async function placeBet() {
  const betNumber = document.getElementById("bet-number").value;
  const amount = document.getElementById("bet-amount").value;
  if(betNumber.length !== 10){ alert("Enter 10-digit number"); return; }
  if(amount <= 0){ alert("Enter valid amount"); return; }

  const { error } = await supabase.from("bets")
    .insert([{ user_id: USER_ID, bet_number: betNumber, amount: amount, current_streak:0, current_multiplier:0, status:"pending" }]);

  if(error) { alert(error.message); return; }
  alert("Bet placed!");
  loadBets();
}

/* ---------- LOAD USER BETS ---------- */
async function loadBets() {
  const { data } = await supabase.from("bets")
    .select("*")
    .eq("user_id", USER_ID)
    .order("created_at", { ascending: false });

  const container = document.getElementById("user-bets");
  container.innerHTML = "";

  data.forEach(bet => {
    container.innerHTML += `
      <div class="card flex justify-between items-center">
        <div>
          <b>Number:</b> ${bet.bet_number}<br>
          <b>Amount:</b> ₹${bet.amount}
        </div>
        <div class="text-right">
          <b>Streak:</b> ${bet.current_streak}<br>
          <b>Multiplier:</b> ${bet.current_multiplier}x
        </div>
      </div>`;
  });
}

/* ---------- LIVE RESULT SUBSCRIPTION ---------- */
supabase.from("daily_results")
  .on("UPDATE", payload => {
    const revealed = payload.new.revealed_digits || "";
    document.getElementById("live-result").innerText = revealed || "Waiting for first reveal...";
    updateBets(revealed);
  })
  .subscribe();

/* ---------- UPDATE BETS WITH STREAK LOGIC ---------- */
async function updateBets(revealed) {
  const { data } = await supabase.from("bets")
    .select("*")
    .eq("user_id", USER_ID);

  data.forEach(async bet => {
    let streak=0, maxStreak=0;
    for(let i=0; i<revealed.length; i++){
      if(bet.bet_number[i] === revealed[i]){
        streak++;
        maxStreak = Math.max(maxStreak, streak);
      } else { streak = 0; }
    }
    let multiplier = maxStreak ? 9 * (10**(maxStreak-1)) : 0;

    await supabase.from("bets")
      .update({ current_streak: maxStreak, current_multiplier: multiplier })
      .eq("id", bet.id);
  });

  loadBets();
}

/* ---------- INITIAL LOAD ---------- */
loadBets();
</script>

</body>
</html>
